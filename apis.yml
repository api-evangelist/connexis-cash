aid: connexis-cash
name: Connexis Cash
description: >-
  Connexis Cash is BNP Paribas's corporate digital banking and cash
  management platform. It gives multinational corporates a unified online
  channel for payment initiation, real-time payment tracking, account
  reporting, reconciliation, and liquidity management across BNP Paribas's
  global network. Connexis Cash also exposes PSD2-compliant Open Banking
  APIs through the BNP Paribas CIB developer portal so that third-party
  providers (TPPs) can retrieve account information and initiate payments
  on behalf of Connexis Cash users, as well as a Strong Customer
  Authentication (SCA) flow.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/connexis-cash/refs/heads/main/apis.yml
